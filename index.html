<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Time Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>CCTV Time Correction Calculator</h1>

        <div class="input-group">
            <label for="correct-datetime">Correct cctv Date & Time (Current)</label>
            <input type="datetime-local" id="correct-datetime">
        </div>

        <div class="input-group">
            <label for="incorrect-datetime">Incorrect cctv Date & Time (Current)</label>
            <input type="datetime-local" id="incorrect-datetime">
        </div>

        <div class="input-group">
            <label for="incident-datetime">Incident correct time & Date</label>
            <input type="datetime-local" id="incident-datetime">
        </div>

        <button id="calculate-btn">Find Accurate CCTV Date & Time</button>

        <div class="result">
            <h2>Time Difference</h2>
            <p id="difference-display"></p>
        </div>

        <div class="result">
            <h2>Final Incident CCTV Date & Time</h2>
            <p id="final-result-display"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
