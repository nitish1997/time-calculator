<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Time Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>CCTV Time Correction Calculator</h1>

        <div class="input-group">
            <label for="correct-datetime">Correct cctv Date & Time (Current)</label>
            <input type="datetime-local" id="correct-datetime">
        </div>

        <div class="input-group">
            <label for="incorrect-datetime">Incorrect cctv Date & Time (Current)</label>
            <input type="datetime-local" id="incorrect-datetime">
        </div>

        <div class="input-group">
            <label for="incident-datetime">Incident correct time & Date</label>
            <input type="datetime-local" id="incident-datetime">
        </div>

        <button id="calculate-btn">Find Accurate CCTV Date & Time</button>

        <div class="result" style="display:none;">
            <p id="difference-display"></p>
            <p id="final-result-display"></p>
        </div>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h1 style="color: #00ffbf; margin-bottom: 20px;">Calculation Results</h1>
            
            <div class="result-section">
                <h3 style="font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px;">Time Difference</h3>
                <p id="modal-difference" style="font-size: 20px; font-weight: bold; color: white;"></p>
            </div>

            <div class="result-section" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <h3 style="font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px;">Final Incident CCTV Date & Time</h3>
                <p id="modal-final-result" style="font-size: 24px; font-weight: bold; color: #00ffbf; text-shadow: 0 0 15px rgba(0, 255, 191, 0.4);"></p>
            </div>

            <button id="close-modal-btn" style="margin-top: 30px; background: rgba(255,255,255,0.1); box-shadow: none;">Dismiss</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
